<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟 - Pomodoro Timer</title>
<style>
  /* ══════════════════════════════════════════════════
     Design Tokens
     ══════════════════════════════════════════════════ */
  :root {
    --bg: #07070e;
    --bg-dot: rgba(255,255,255,0.02);
    --surface: #13132a;
    --surface2: #1c1c3a;
    --surface3: #262650;
    --text: #f0f0f6;
    --text-secondary: #9090b8;
    --text-muted: #5e5e88;
    --border: #282850;
    --border-light: #222248;
    --radius: 18px;
    --radius-sm: 12px;
    --transition: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
    --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* 模式配色 — 渐变 tonal palette */
  :root {
    --work:       #ff6b6b;
    --work-glow:  rgba(255, 107, 107, 0.40);
    --work-bg:    rgba(255, 107, 107, 0.10);
    --work-grad:  linear-gradient(135deg, #ff6b6b, #f06565);
    --study:      #7c5cfc;
    --study-glow: rgba(124, 92, 252, 0.40);
    --study-bg:   rgba(124, 92, 252, 0.10);
    --study-grad: linear-gradient(135deg, #7c5cfc, #6a4de8);
    --entertain:  #20c997;
    --entertain-glow: rgba(32, 201, 151, 0.40);
    --entertain-bg:   rgba(32, 201, 151, 0.10);
    --entertain-grad: linear-gradient(135deg, #20c997, #1aaf82);
  }

  /* ─── Reset ──────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── Body & Background ────────────────────────── */
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    /* 点阵纹理 */
    background-image:
      radial-gradient(circle at 1px 1px, var(--bg-dot) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* 双重光晕 */
  body::before,
  body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle at center, var(--accent-glow, var(--work-glow)) 0%, transparent 60%);
    transition: background var(--transition);
  }
  body::after {
    top: 20%; left: 65%;
    width: 300px; height: 300px;
    background: radial-gradient(circle at center, rgba(255,255,255,0.04) 0%, transparent 70%);
    opacity: 0.5;
  }

  /* ══════════════════════════════════════════════════
     主窗口
     ══════════════════════════════════════════════════ */
  .app-main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    padding: 24px;
    max-width: 580px;
    width: 100%;
  }

  /* Logo */
  .app-logo {
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: 0.03em;
    background: linear-gradient(135deg, var(--accent, var(--work)), hsl(from var(--accent, var(--work)) calc(h + 20) s l));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 8px var(--accent-glow, var(--work-glow)));
    animation: logo-shimmer 3s ease-in-out infinite;
  }

  @keyframes logo-shimmer {
    0%, 100% { filter: drop-shadow(0 2px 8px var(--accent-glow, var(--work-glow))); }
    50% { filter: drop-shadow(0 4px 16px var(--accent-glow, var(--work-glow))); }
  }

  /* Section title */
  .section-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    align-self: flex-start;
    padding-left: 4px;
  }

  /* ─── 模式卡片 ─────────────────────────────────── */
  .mode-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
  }

  .mode-card {
    position: relative;
    padding: 22px 12px 18px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    cursor: pointer;
    text-align: center;
    transition: all var(--transition);
    overflow: hidden;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  /* 顶部 accent bar */
  .mode-card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 3px;
    border-radius: 0 0 3px 3px;
    background: var(--mode-color);
    opacity: 0;
    transform: scaleX(0);
    transition: all var(--transition);
  }

  /* 悬停发光层 */
  .mode-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(ellipse at 50% 0%, var(--mode-glow) 0%, transparent 70%);
    opacity: 0;
    transition: opacity var(--transition);
  }

  .mode-card:hover {
    border-color: var(--mode-color);
    transform: translateY(-4px) perspective(800px) rotateX(3deg);
    box-shadow:
      0 12px 32px var(--mode-glow),
      0 2px 8px rgba(0,0,0,0.3);
  }

  .mode-card:hover::before {
    opacity: 1;
    transform: scaleX(1);
  }

  .mode-card:hover::after {
    opacity: 1;
  }

  .mode-card:active {
    transform: translateY(-1px) scale(0.98);
  }

  .mode-card.selected {
    border-color: var(--mode-color);
    background: var(--mode-bg);
    box-shadow:
      0 0 0 5px var(--mode-glow),
      inset 0 0 30px var(--mode-glow);
  }

  .mode-card.selected::before {
    opacity: 1;
    transform: scaleX(1);
  }

  .mode-card .mode-icon {
    font-size: 2.5rem;
    margin-bottom: 8px;
    transition: transform var(--transition);
    filter: drop-shadow(0 2px 6px var(--mode-glow));
    position: relative;
    z-index: 1;
  }

  .mode-card:hover .mode-icon {
    transform: scale(1.15) translateY(-2px);
  }

  .mode-card .mode-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
    position: relative;
    z-index: 1;
  }

  .mode-card .mode-duration {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--mode-color);
    position: relative;
    z-index: 1;
  }

  .mode-card .mode-detail {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 3px;
    position: relative;
    z-index: 1;
  }

  .mode-card .check-mark {
    position: absolute;
    top: 10px; right: 12px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--mode-color);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: #fff;
    z-index: 2;
    opacity: 0;
    transform: scale(0.3) rotate(-45deg);
    transition: all var(--transition);
  }

  .mode-card.selected .check-mark {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  /* ─── 启动按钮 ─────────────────────────────────── */
  .launch-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .btn-launch {
    width: 100%;
    padding: 18px 32px;
    border-radius: var(--radius);
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: none;
    cursor: pointer;
    font-family: inherit;
    background: var(--accent-grad, var(--work-grad));
    color: #fff;
    box-shadow:
      0 8px 32px var(--accent-glow, var(--work-glow)),
      0 2px 8px rgba(0,0,0,0.4);
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  /* 闪光扫过效果 */
  .btn-launch::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: skewX(-25deg);
    animation: shimmer 3.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { left: -100%; }
    50% { left: 130%; }
  }

  .btn-launch:hover {
    box-shadow:
      0 12px 40px var(--accent-glow, var(--work-glow)),
      0 4px 12px rgba(0,0,0,0.5);
    transform: translateY(-3px);
  }

  .btn-launch:active {
    transform: translateY(0) scale(0.97);
  }

  .btn-launch.popup-open {
    background: transparent;
    border: 2px solid var(--accent, var(--work));
    color: var(--accent, var(--work));
    box-shadow: 0 0 0 6px var(--accent-glow, var(--work-glow));
    animation: breathe 2.5s ease-in-out infinite;
  }

  .btn-launch.popup-open::after { display: none; }

  .btn-launch.popup-open:hover {
    background: var(--accent, var(--work));
    color: #fff;
    box-shadow: 0 12px 40px var(--accent-glow, var(--work-glow));
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 0 6px var(--accent-glow, var(--work-glow)); }
    50% { box-shadow: 0 0 0 12px transparent; }
  }

  .popup-status {
    font-size: 0.8rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 22px;
  }

  .popup-status .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent, var(--work));
    box-shadow: 0 0 8px var(--accent-glow, var(--work-glow));
    animation: pulse-dot 1.5s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }

  /* ─── 设置触发器 ────────────────────────────────── */
  .settings-trigger {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 24px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all var(--transition);
    margin-top: -10px;
  }

  .settings-trigger:hover {
    color: var(--text);
    border-color: var(--text-muted);
    background: var(--surface2);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  /* ─── 设置面板 ─────────────────────────────────── */
  .settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
  }

  .settings-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .settings-panel {
    position: fixed;
    top: 0;
    right: -420px;
    width: 400px;
    height: 100vh;
    background: var(--surface);
    z-index: 11;
    padding: 40px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    transition: right 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
    border-left: 1px solid var(--border-light);
    overflow-y: auto;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: -8px 0 40px rgba(0,0,0,0.5);
  }

  .settings-panel.open { right: 0; }

  .settings-panel h2 {
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .settings-panel .close-btn {
    position: absolute;
    top: 28px; right: 28px;
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
    font-size: 1.15rem;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--transition-fast);
  }

  .settings-panel .close-btn:hover {
    color: var(--text);
    background: var(--surface3);
    border-color: var(--text-muted);
    transform: rotate(90deg);
  }

  .setting-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .setting-group > label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .setting-row input {
    flex: 1;
    padding: 13px 16px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 1.05rem;
    font-weight: 600;
    font-family: inherit;
    transition: all var(--transition-fast);
  }

  .setting-row input:focus {
    outline: none;
    border-color: var(--accent, var(--work));
    box-shadow: 0 0 0 4px var(--accent-glow, var(--work-glow));
  }

  .setting-row input:hover:not(:focus) {
    border-color: var(--surface3);
  }

  .setting-row .unit {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
    min-width: 32px;
  }

  .setting-hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .btn-save {
    width: 100%;
    padding: 15px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    background: var(--accent-grad, var(--work-grad));
    color: #fff;
    margin-top: 12px;
    transition: all var(--transition);
    box-shadow: 0 4px 16px var(--accent-glow, var(--work-glow));
    letter-spacing: 0.03em;
  }

  .btn-save:hover {
    box-shadow: 0 6px 24px var(--accent-glow, var(--work-glow));
    transform: translateY(-2px);
  }

  .btn-save:active {
    transform: translateY(0) scale(0.97);
  }

  .btn-reset {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    font-size: 0.9rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    transition: all var(--transition);
    letter-spacing: 0.03em;
  }

  .btn-reset:hover {
    color: var(--text);
    border-color: var(--text-muted);
    background: var(--surface2);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    padding: 14px 28px;
    border-radius: 28px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 500;
    z-index: 20;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    border: 1px solid var(--border-light);
    transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
    pointer-events: none;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ══════════════════════════════════════════════════
     弹出窗口 (Popup)
     ══════════════════════════════════════════════════ */
  .app-popup {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 28px 18px 20px;
    min-width: 290px;
    max-width: 350px;
    background: var(--bg);
  }

  .popup-mode-label {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent, var(--work));
    padding: 8px 22px;
    border-radius: 20px;
    background: var(--surface);
    border: 1.5px solid var(--accent, var(--work));
    transition: all var(--transition);
    box-shadow: 0 0 16px var(--accent-glow, var(--work-glow));
  }

  /* 圆形进度环 */
  .timer-ring-wrap {
    position: relative;
    width: 240px;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .timer-ring-wrap svg {
    position: absolute;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .popup-progress-bg {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 10;
  }

  .popup-progress-ring {
    fill: none;
    stroke: var(--accent, var(--work));
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke var(--transition), stroke-dashoffset 0.15s linear;
    filter:
      drop-shadow(0 0 8px var(--accent-glow, var(--work-glow)))
      drop-shadow(0 0 20px var(--accent-glow, var(--work-glow)));
  }

  .popup-timer-display {
    font-size: 3.8rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    color: var(--text);
    text-shadow: 0 0 30px var(--accent-glow, var(--work-glow));
    z-index: 2;
    transition: opacity var(--transition-fast);
  }

  .popup-timer-display.paused {
    opacity: 0.45;
  }

  /* 进度圆点 */
  .popup-session-dots {
    display: flex;
    gap: 11px;
    align-items: center;
  }

  .popup-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--surface2);
    transition: all var(--transition);
    border: 1.5px solid transparent;
  }

  .popup-dot.done {
    background: var(--accent, var(--work));
    border-color: var(--accent, var(--work));
    box-shadow: 0 0 10px var(--accent-glow, var(--work-glow));
  }

  .popup-dot.current {
    background: var(--accent, var(--work));
    border-color: var(--accent, var(--work));
    box-shadow: 0 0 12px var(--accent-glow, var(--work-glow));
    animation: dot-breathe 2s ease-in-out infinite;
  }

  @keyframes dot-breathe {
    0%, 100% { transform: scale(1); box-shadow: 0 0 10px var(--accent-glow, var(--work-glow)); }
    50% { transform: scale(1.35); box-shadow: 0 0 20px var(--accent-glow, var(--work-glow)); }
  }

  .popup-session-label {
    font-size: 0.73rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-left: 3px;
  }

  /* 控制按钮 */
  .popup-controls {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .popup-btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--transition-fast);
    outline: none;
    position: relative;
  }

  .popup-btn:active { transform: scale(0.93); }

  .popup-btn-start {
    min-width: 130px;
    padding: 13px 32px;
    border-radius: 26px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: var(--accent-grad, var(--work-grad));
    color: #fff;
    box-shadow: 0 6px 22px var(--accent-glow, var(--work-glow));
    transition: all var(--transition);
  }

  .popup-btn-start:hover {
    box-shadow: 0 8px 30px var(--accent-glow, var(--work-glow));
    transform: translateY(-2px);
  }

  .popup-btn-start:active {
    transform: translateY(0) scale(0.95);
  }

  .popup-btn-start.running {
    background: transparent;
    border: 2px solid var(--accent, var(--work));
    color: var(--accent, var(--work));
    box-shadow: 0 0 0 4px var(--accent-glow, var(--work-glow));
    animation: breathe-btn 2.5s ease-in-out infinite;
  }

  .popup-btn-start.running:hover {
    background: var(--accent, var(--work));
    color: #fff;
    box-shadow: 0 8px 30px var(--accent-glow, var(--work-glow));
  }

  @keyframes breathe-btn {
    0%, 100% { box-shadow: 0 0 0 4px var(--accent-glow, var(--work-glow)); }
    50% { box-shadow: 0 0 0 10px transparent; }
  }

  .popup-btn-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.15rem;
    background: var(--surface);
    color: var(--text-secondary);
    border: 1.5px solid var(--border-light);
    transition: all var(--transition-fast);
  }

  .popup-btn-icon:hover {
    color: var(--text);
    border-color: var(--text-muted);
    background: var(--surface2);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  /* 响应式 */
  @media (max-width: 520px) {
    .app-main { gap: 28px; padding: 16px; }
    .mode-cards {
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .mode-card { padding: 16px 20px; }
    .mode-card .mode-icon { font-size: 2rem; }
    .settings-panel {
      width: 100%;
      right: -100%;
    }
    .popup-timer-display { font-size: 3.2rem; }
    .timer-ring-wrap { width: 200px; height: 200px; }
  }
</style>
</head>
<body>

<div class="app-main" id="mainView">

<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
  <button class="close-btn" id="btnCloseSettings">✕</button>

  <div class="setting-group">

      <input type="number" id="setFocus" min="1" max="180" value="25">

      <input type="number" id="setLongBreak" min="1" max="120" value="15">
      <span class="unit">分钟</span>
    </div>
  </div>

    <label>长休息间隔</label>
    <div class="setting-row">
      <input type="number" id="setLongInterval" min="1" max="10" value="4">
      <span class="unit">轮</span>
    </div>
    <span class="setting-hint">完成 N 轮专注后进入一次长休息</span>

  <button class="btn-reset" id="btnResetSettings">恢复默认</button>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ═══════════════════════════════════════════════
  //  工具函数
  // ═══════════════════════════════════════════════
  const $ = (sel, ctx) => (ctx || document).querySelector(sel);
  const CLAMP = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  // ═══════════════════════════════════════════════
  //  模式定义
  // ═══════════════════════════════════════════════
  const MODE_TYPES = {
    work:      { id: 'work',      icon: '💼', name: '工作', accent: '--work',      glow: '--work-glow',      bg: '--work-bg' },
    study:     { id: 'study',     icon: '📚', name: '学习', accent: '--study',     glow: '--study-glow',     bg: '--study-bg' },
    entertain: { id: 'entertain', icon: '🎮', name: '娱乐', accent: '--entertain', glow: '--entertain-glow', bg: '--entertain-bg' },
  };

  const MODE_DEFAULTS = {
    work:      { focus: 25, shortBreak: 5,  longBreak: 15, longInterval: 4, hasBreaks: true },
    study:     { focus: 45, shortBreak: 10, longBreak: 20, longInterval: 3, hasBreaks: true },
    entertain: { focus: 30, shortBreak: 5,  longBreak: 15, longInterval: 99, hasBreaks: false },
  };

  const BREAK = { SHORT: 'shortBreak', LONG: 'longBreak' };

  // ═══════════════════════════════════════════════
  //  全局状态
  // ═══════════════════════════════════════════════
  const IS_POPUP = new URLSearchParams(location.search).get('popup') === '1';
  let selectedMode = loadPref('selectedMode', 'work');
  let customSettings = loadCustomSettings();
  let popupWindow = null;
  let channel = null;
  let popupConnected = false;

  // ═══════════════════════════════════════════════
  //  持久化
  // ═══════════════════════════════════════════════
  function loadPref(key, fallback) {
    try {
      const v = localStorage.getItem('pomodoro-' + key);
      return v !== null ? JSON.parse(v) : fallback;
    } catch { return fallback; }
  }

  function savePref(key, val) {
    try { localStorage.setItem('pomodoro-' + key, JSON.stringify(val)); } catch {}
  }

  function loadCustomSettings() {
    const def = MODE_DEFAULTS[selectedMode];
    return {
      focus:       loadPref('focus-' + selectedMode, def.focus),
      shortBreak:  loadPref('shortBreak-' + selectedMode, def.shortBreak),
      longBreak:   loadPref('longBreak-' + selectedMode, def.longBreak),
      longInterval: loadPref('longInterval-' + selectedMode, def.longInterval),
    };
  }

  function saveCustomSettings() {
    savePref('focus-' + selectedMode, customSettings.focus);
    savePref('shortBreak-' + selectedMode, customSettings.shortBreak);
    savePref('longBreak-' + selectedMode, customSettings.longBreak);
    savePref('longInterval-' + selectedMode, customSettings.longInterval);
  }

  function getSettings() {
    return { ...customSettings, hasBreaks: MODE_DEFAULTS[selectedMode].hasBreaks };
  }

  function applyAccent(mode) {
    const m = MODE_TYPES[mode];
    document.documentElement.style.setProperty('--accent', `var(${m.accent})`);
    document.documentElement.style.setProperty('--accent-glow', `var(${m.glow})`);
    document.documentElement.style.setProperty('--accent-secondary', `var(${m.accent})`);
  }

  // ═══════════════════════════════════════════════
  //  计时器核心类（弹出窗口使用）
  // ═══════════════════════════════════════════════
  class PomodoroTimer {
    constructor() {
      this.mode = selectedMode;
      this.session = 'focus'; // 'focus' | 'shortBreak' | 'longBreak'
      this.totalSeconds = 0;
      this.remainingSeconds = 0;
      this.completedSessions = 0;
      this.totalCompleted = 0;
      this.timerId = null;
      this.running = false;

      // DOM refs (popup only)
      this.$ring    = $('#popupProgressRing');
      this.$display = $('#popupTimerDisplay');
      this.$label   = $('#popupModeLabel');
      this.$dots    = $('#popupSessionDots');
      this.$btnStart = $('#popupBtnStart');
      this.$btnSkip  = $('#popupBtnSkip');
      this.$btnReset = $('#popupBtnReset');

      this.circumference = 2 * Math.PI * 106; // r=106
      if (this.$ring) {
        this.$ring.style.strokeDasharray = this.circumference;
        this.$ring.style.strokeDashoffset = '0';
      }

      this.reset();
    }

    get settings() { return getSettings(); }

    reset() {
      this.stop();
      this.session = 'focus';
      this.completedSessions = 0;
      this.totalSeconds = this.settings.focus * 60;
      this.remainingSeconds = this.totalSeconds;
      this.updateAll();
      this.updateButton();
    }

    start() {
      if (this.running) return;
      this.running = true;
      this.updateButton();
      this.timerId = setInterval(() => this.tick(), 1000);
    }

    pause() {
      this.running = false;
      if (this.timerId) { clearInterval(this.timerId); this.timerId = null; }
      this.updateButton();
      if (this.$display) this.$display.classList.add('paused');
    }

    stop() {
      this.running = false;
      if (this.timerId) { clearInterval(this.timerId); this.timerId = null; }
      if (this.$display) this.$display.classList.remove('paused');
    }

    toggle() {
      this.running ? this.pause() : this.start();
    }

    skip() {
      this.stop();
      this.handleComplete();
    }

    tick() {
      this.remainingSeconds--;
      this.updateDisplay();
      this.updateRing();
      this.updateTitle();
      if (this.remainingSeconds <= 0) {
        this.handleComplete();
      }
    }

    handleComplete() {
      this.stop();
      playBeep();

      if (this.session === 'focus') {
        this.completedSessions++;
        this.totalCompleted++;

        if (this.settings.hasBreaks && this.completedSessions >= this.settings.longInterval) {
          this.completedSessions = 0;
          this.session = BREAK.LONG;
        } else if (this.settings.hasBreaks) {
          this.session = BREAK.SHORT;
        } else {
          // 娱乐模式：无休息，重新开始计时
          this.session = 'focus';
        }
      } else {
        this.session = 'focus';
      }

      this.totalSeconds = this.getSessionSeconds();
      this.remainingSeconds = this.totalSeconds;
      this.updateAll();
      this.updateButton();
      this.flashDisplay();
      this.sendState();
      notifyUser();
    }

    getSessionSeconds() {
      switch (this.session) {
        case 'focus':      return this.settings.focus * 60;
        case BREAK.SHORT:  return this.settings.shortBreak * 60;
        case BREAK.LONG:   return this.settings.longBreak * 60;
        default:           return 25 * 60;
      }
    }

    setMode(mode) {
      this.mode = mode;
      applyAccent(mode);
      this.reset();
    }

    applySettings(s) {
      // handled via getSettings() dynamically
    }

    // ─── 显示 ──────────────────────────────────
    format(sec) {
      const m = Math.floor(sec / 60), s = sec % 60;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    updateAll() {
      this.updateDisplay();
      this.updateRing();
      this.updateLabel();
      this.updateDots();
      this.updateTitle();
    }

    updateDisplay() {
      if (this.$display) this.$display.textContent = this.format(this.remainingSeconds);
    }

    updateRing() {
      if (!this.$ring) return;
      const elapsed = this.totalSeconds - this.remainingSeconds;
      const frac = this.totalSeconds > 0 ? elapsed / this.totalSeconds : 0;
      this.$ring.style.strokeDashoffset = this.circumference * (1 - frac);
    }

    updateLabel() {
      if (!this.$label) return;
      const modeInfo = MODE_TYPES[this.mode];
      const labels = {
        focus: modeInfo.icon + ' ' + modeInfo.name + '中',
        shortBreak: '☕ 短休息',
        longBreak: '🌴 长休息',
      };
      this.$label.textContent = labels[this.session] || labels.focus;
    }

    updateDots() {
      if (!this.$dots) return;
      const dots = this.$dots.querySelectorAll('.popup-dot');
      const total = this.settings.hasBreaks ? this.settings.longInterval : 1;
      dots.forEach((dot, i) => {
        dot.classList.remove('done', 'current');
        if (i < this.completedSessions) dot.classList.add('done');
      });
      if (this.session === 'focus' && this.completedSessions < total) {
        dots[this.completedSessions]?.classList.add('current');
      }
      const lbl = this.$dots.querySelector('.popup-session-label');
      if (lbl) lbl.textContent = `第 ${Math.min(this.completedSessions + 1, total)} 轮`;
    }

    updateTitle() {
      const label = this.$label ? this.$label.textContent : '';
      const state = this.running ? '' : ' ⏸';
      document.title = `${this.format(this.remainingSeconds)} - ${label}${state}`;
    }

    updateButton() {
      if (!this.$btnStart) return;
      if (this.running) {
        this.$btnStart.textContent = '暂停';
        this.$btnStart.classList.add('running');
      } else if (this.remainingSeconds < this.totalSeconds) {
        this.$btnStart.textContent = '继续';
        this.$btnStart.classList.add('running');
      } else {
        this.$btnStart.textContent = '开始';
        this.$btnStart.classList.remove('running');
      }
      if (this.$display) {
        this.$display.classList.toggle('paused', !this.running && this.remainingSeconds < this.totalSeconds);
      }
    }

    flashDisplay() {
      if (!this.$display) return;
      this.$display.style.transform = 'scale(1.1)';
      this.$display.style.transition = 'transform 0.15s ease';
      setTimeout(() => { this.$display.style.transform = 'scale(1)'; }, 150);
    }

    sendState() {
      if (!channel) return;
      channel.postMessage({
        type: 'stateUpdate',
        mode: this.mode,
        session: this.session,
        remainingSeconds: this.remainingSeconds,
        totalSeconds: this.totalSeconds,
        running: this.running,
        completedSessions: this.completedSessions,
        totalCompleted: this.totalCompleted,
      });
    }
  }

  // ═══════════════════════════════════════════════
  //  音效
  // ═══════════════════════════════════════════════
  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.18);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.18 + 0.35);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + i * 0.18);
        osc.stop(ctx.currentTime + i * 0.18 + 0.4);
      });
    } catch {}
  }

  // ═══════════════════════════════════════════════
  //  通知
  // ═══════════════════════════════════════════════
  function notifyUser() {
    if (!('Notification' in window)) return;
    const send = () => {
      const modeInfo = MODE_TYPES[selectedMode];
      const title = `⏰ ${modeInfo.name}计时结束！`;
      const body = '该休息一下了~ 打开番茄钟继续下一轮吧。';
      try {
        const n = new Notification(title, { body, requireInteraction: true });
        setTimeout(() => n.close(), 8000);
      } catch {}
    };
    if (Notification.permission === 'granted') send();
    else if (Notification.permission !== 'denied') {
      Notification.requestPermission().then(p => { if (p === 'granted') send(); });
    }
  }

  // ═══════════════════════════════════════════════
  //  Toast
  // ═══════════════════════════════════════════════
  let toastTimer;
  function showToast(msg) {
    const $t = $('#toast');
    if (!$t) return;
    $t.textContent = msg;
    $t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $t.classList.remove('show'), 2000);
  }

  // ═══════════════════════════════════════════════
  //  BroadcastChannel
  // ═══════════════════════════════════════════════
  function setupChannel() {
    try {
      channel = new BroadcastChannel('pomodoro-sync');
      channel.onmessage = (e) => {
        const msg = e.data;
        if (IS_POPUP) {
          handlePopupMessage(msg);
        } else {
          handleMainMessage(msg);
        }
      };
    } catch {
      channel = null;
    }
  }

  // ═══════════════════════════════════════════════
  //  主窗口逻辑
  // ═══════════════════════════════════════════════
  function initMain() {
    applyAccent(selectedMode);
    updateMainUI();

    // 模式选择
    $('#modeCards').addEventListener('click', (e) => {
      const card = e.target.closest('.mode-card');
      if (!card) return;
      const mode = card.dataset.mode;
      if (mode === selectedMode) return;
      selectedMode = mode;
      customSettings = loadCustomSettings();
      savePref('selectedMode', selectedMode);
      applyAccent(selectedMode);
      updateMainUI();
      syncSettingsToInputs();

      // 同步到弹出窗口
      if (popupConnected && channel) {
        channel.postMessage({ type: 'switchMode', mode: selectedMode, settings: getSettings() });
      }
    });

    // 弹出按钮
    $('#btnLaunch').addEventListener('click', togglePopup);

    // 设置
    $('#btnSettings').addEventListener('click', openSettings);
    $('#btnCloseSettings').addEventListener('click', closeSettings);
    $('#settingsOverlay').addEventListener('click', closeSettings);
    $('#btnSaveSettings').addEventListener('click', () => {
      readSettingsFromInputs();
      saveCustomSettings();
      syncSettingsToInputs();
      closeSettings();
      updateMainUI();
      if (popupConnected && channel) {
        channel.postMessage({ type: 'updateSettings', settings: getSettings() });
      }
      showToast('设置已保存');
    });
    $('#btnResetSettings').addEventListener('click', () => {
      const def = MODE_DEFAULTS[selectedMode];
      customSettings = { focus: def.focus, shortBreak: def.shortBreak, longBreak: def.longBreak, longInterval: def.longInterval };
      saveCustomSettings();
      syncSettingsToInputs();
      updateMainUI();
      if (popupConnected && channel) {
        channel.postMessage({ type: 'updateSettings', settings: getSettings() });
      }
      showToast('已恢复默认设置');
    });

    // 键盘
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Escape') closeSettings();
    });

    // 检查弹出窗口是否还开着
    setInterval(() => {
      if (popupWindow && popupWindow.closed && popupConnected) {
        popupConnected = false;
        popupWindow = null;
        updatePopupUI();
      }
    }, 500);

    // 页面关闭前关闭弹窗
    window.addEventListener('beforeunload', () => {
      if (popupWindow && !popupWindow.closed) popupWindow.close();
    });

    syncSettingsToInputs();
  }

  function updateMainUI() {
    // 模式卡片选中状态
    $$('.mode-card').forEach(c => {
      c.classList.toggle('selected', c.dataset.mode === selectedMode);
    });
    updatePopupUI();
  }

  function updatePopupUI() {
    const btn = $('#btnLaunch');
    const st = $('#popupStatus');
    if (popupConnected) {
      btn.textContent = '🔄 计时器运行中';
      btn.classList.add('popup-open');
      st.innerHTML = '<span class="dot"></span> 计时窗口已连接';
    } else {
      btn.textContent = '▶ 弹出计时器';
      btn.classList.remove('popup-open');
      st.innerHTML = '';
    }
  }

  function togglePopup() {
    if (popupConnected && popupWindow && !popupWindow.closed) {
      // 弹窗已存在 → 聚焦
      popupWindow.focus();
      showToast('计时器窗口已打开');
    } else {
      openPopup();
    }
  }

  function openPopup() {
    const url = location.href.replace(location.search, '').replace(location.hash, '') + '?popup=1';
    const w = 350, h = 480;
    const left = Math.max(0, (screen.width - w) / 2);
    const top = Math.max(0, (screen.height - h) / 2);

    popupWindow = window.open(url, 'PomodoroTimer',
      `width=${w},height=${h},left=${Math.round(left)},top=${Math.round(top)},` +
      `resizable=yes,scrollbars=no,status=no,toolbar=no,menubar=no,location=no`
    );

    if (!popupWindow) {
      showToast('⚠ 弹窗被拦截，请允许此网站弹出窗口');
      return;
    }

    // 等待弹窗就绪后发送初始化消息
    const readyHandler = (e) => {
      if (e.data && e.data.type === 'popupReady') {
        window.removeEventListener('message', readyHandler);
        popupConnected = true;
        updatePopupUI();

        // 发送初始状态
        if (channel) {
          channel.postMessage({
            type: 'init',
            mode: selectedMode,
            settings: getSettings(),
          });
        }
        showToast('计时器窗口已就绪');
      }
    };
    window.addEventListener('message', readyHandler);

    // 超时处理
    setTimeout(() => {
      if (!popupConnected && popupWindow && !popupWindow.closed) {
        // 手动假设就绪
        popupConnected = true;
        updatePopupUI();
        if (channel) {
          channel.postMessage({ type: 'init', mode: selectedMode, settings: getSettings() });
        }
      }
    }, 1500);
  }

  function handleMainMessage(msg) {
    switch (msg.type) {
      case 'stateUpdate':
        // 更新主窗口对弹出窗口状态的感知（可用于显示状态信息）
        break;
      case 'popupClosed':
        popupConnected = false;
        popupWindow = null;
        updatePopupUI();
        showToast('计时器窗口已关闭');
        break;
    }
  }

  // ═══════════════════════════════════════════════
  //  弹出窗口逻辑
  // ═══════════════════════════════════════════════
  let timer = null;

  function initPopup() {
    timer = new PomodoroTimer();
    applyAccent(selectedMode);

    // 按钮事件
    $('#popupBtnStart').addEventListener('click', () => timer.toggle());
    $('#popupBtnReset').addEventListener('click', () => { timer.reset(); showToast('已重置'); });
    $('#popupBtnSkip').addEventListener('click', () => {
      if (timer.running || timer.remainingSeconds < timer.totalSeconds) {
        timer.skip();
        showToast('已跳过');
      }
    });

    // 键盘
    document.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'Space': e.preventDefault(); timer.toggle(); break;
        case 'KeyR': e.preventDefault(); timer.reset(); showToast('已重置'); break;
        case 'KeyS': e.preventDefault();
          if (timer.running || timer.remainingSeconds < timer.totalSeconds) {
            timer.skip(); showToast('已跳过');
          }
          break;
      }
    });

    // 通知主窗口就绪
    if (window.opener) {
      window.opener.postMessage({ type: 'popupReady' }, '*');
    }

    // 窗口关闭通知
    window.addEventListener('beforeunload', () => {
      if (channel) channel.postMessage({ type: 'popupClosed' });
    });

    updatePopupTitle();
  }

  function handlePopupMessage(msg) {
    if (!timer) return;
    switch (msg.type) {
      case 'init':
      case 'switchMode':
        selectedMode = msg.mode;
        if (msg.settings) {
          customSettings = { ...customSettings, ...msg.settings };
        }
        timer.setMode(msg.mode);
        updatePopupTitle();
        break;
      case 'updateSettings':
        if (msg.settings) {
          customSettings = { ...customSettings, ...msg.settings };
        }
        timer.reset();
        updatePopupTitle();
        break;
    }
  }

  function updatePopupTitle() {
    const modeInfo = MODE_TYPES[selectedMode];
    document.title = modeInfo.icon + ' ' + modeInfo.name + ' · 番茄钟';
  }

  // ═══════════════════════════════════════════════
  //  设置面板
  // ═══════════════════════════════════════════════
  function syncSettingsToInputs() {
    const s = customSettings;
    setInputVal('setFocus', s.focus);
    setInputVal('setShortBreak', s.shortBreak);
    setInputVal('setLongBreak', s.longBreak);
    setInputVal('setLongInterval', s.longInterval);
  }

  function readSettingsFromInputs() {
    const def = MODE_DEFAULTS[selectedMode];
    customSettings.focus       = CLAMP(parseInt($('#setFocus').value) || def.focus, 1, 180);
    customSettings.shortBreak  = CLAMP(parseInt($('#setShortBreak').value) || def.shortBreak, 1, 60);
    customSettings.longBreak   = CLAMP(parseInt($('#setLongBreak').value) || def.longBreak, 1, 120);
    customSettings.longInterval = CLAMP(parseInt($('#setLongInterval').value) || def.longInterval, 1, 10);
  }

  function setInputVal(id, val) {
    const el = $('#' + id);
    if (el) el.value = val;
  }

  function openSettings() {
    syncSettingsToInputs();
    $('#settingsOverlay').classList.add('open');
    $('#settingsPanel').classList.add('open');
  }

  function closeSettings() {
    $('#settingsOverlay').classList.remove('open');
    $('#settingsPanel').classList.remove('open');
  }

  function $$(sel) { return document.querySelectorAll(sel); }

  // ═══════════════════════════════════════════════
  //  启动
  // ═══════════════════════════════════════════════
  setupChannel();

  if (IS_POPUP) {
    // 弹出窗口：只显示弹出视图
    $('#mainView').style.display = 'none';
    $('#popupView').style.display = 'flex';
    document.body.style.alignItems = 'flex-start';
    document.body.style.paddingTop = '10px';
    initPopup();
  } else {
    // 主窗口：只显示主视图
    $('#popupView').style.display = 'none';
    $('#mainView').style.display = 'flex';
    initMain();
  }

  console.log(IS_POPUP ? '🍅 番茄钟 · 计时窗口' : '🍅 番茄钟 · 控制面板');
})();
</script>

</body>
</html>
